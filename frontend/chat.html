<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid page-shell">
      <a class="navbar-brand fw-bold" href="index.html">E-commerce Tech</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="products.html">Productos</a></li>
          <li class="nav-item"><a class="nav-link" href="orders.html">Ordenes</a></li>
          <li class="nav-item"><a class="nav-link active" href="chat.html">Chat</a></li>
        </ul>
        <div id="session-info" class="d-flex align-items-center gap-2"></div>
      </div>
    </div>
  </nav>

  <main class="container page-shell py-4">
    <div class="card shadow-sm border-0">
      <div class="card-body">
        <h1 class="h3">Chat de soporte</h1>
        <p class="text-secondary">Pregunta por ordenes, pagos, envio, horarios, cancelaciones o stock.</p>
        <div id="chat-status"></div>
        <div id="chat-box" class="chat-box border rounded p-3 mb-3"></div>
        <form id="chat-form" class="row g-2">
          <div class="col-md-10"><input id="chat-message" class="form-control" placeholder="Ej. Que metodos de pago aceptan?" required></div>
          <div class="col-md-2"><button class="btn btn-primary w-100" type="submit">Enviar</button></div>
        </form>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
