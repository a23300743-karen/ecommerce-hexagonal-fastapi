<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ordenes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid page-shell">
      <a class="navbar-brand fw-bold" href="index.html">E-commerce Tech</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="products.html">Productos</a></li>
          <li class="nav-item"><a class="nav-link active" href="orders.html">Ordenes</a></li>
          <li class="nav-item"><a class="nav-link" href="chat.html">Chat</a></li>
        </ul>
        <div id="session-info" class="d-flex align-items-center gap-2"></div>
      </div>
    </div>
  </nav>

  <main class="container page-shell py-4">
    <h1 class="h2">Ordenes</h1>
    <p class="text-secondary">Crea compradores, genera ordenes y revisa items.</p>
    <div id="order-message"></div>

    <div class="row g-4 mb-4">
      <div class="col-lg-6">
        <section class="card shadow-sm border-0 h-100">
          <div class="card-body">
            <h2 class="h5">Crear comprador</h2>
            <form id="buyer-form" class="row g-3">
              <div class="col-md-6"><label class="form-label">Nombre</label><input id="buyer-name" class="form-control" required></div>
              <div class="col-md-6"><label class="form-label">Email</label><input id="buyer-email" class="form-control" type="email" required></div>
              <div class="col-md-8"><label class="form-label">Direccion</label><input id="buyer-address" class="form-control" required></div>
              <div class="col-md-4"><label class="form-label">Telefono</label><input id="buyer-phone" class="form-control"></div>
              <div class="col-12"><button class="btn btn-primary" type="submit">Crear comprador</button></div>
            </form>
          </div>
        </section>
      </div>
      <div class="col-lg-6">
        <section class="card shadow-sm border-0 h-100">
          <div class="card-body">
            <h2 class="h5">Crear orden</h2>
            <form id="order-form" class="row g-3">
              <div class="col-md-6"><label class="form-label">Comprador</label><select id="buyer-id" class="form-select" required></select></div>
              <div class="col-md-6"><label class="form-label">Producto</label><select id="product-id" class="form-select" required></select></div>
              <div class="col-md-4"><label class="form-label">Cantidad</label><input id="quantity" class="form-control" type="number" min="1" value="1" required></div>
              <div class="col-md-8 d-flex align-items-end"><button class="btn btn-success w-100" type="submit">Crear orden</button></div>
            </form>
          </div>
        </section>
      </div>
    </div>

    <section id="orders-list" class="row g-4"></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/orders.js"></script>
</body>
</html>
