<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid page-shell">
      <a class="navbar-brand fw-bold" href="index.html">E-commerce Tech</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link active" href="products.html">Productos</a></li>
          <li class="nav-item"><a class="nav-link" href="orders.html">Ordenes</a></li>
          <li class="nav-item"><a class="nav-link" href="chat.html">Chat</a></li>
        </ul>
        <div id="session-info" class="d-flex align-items-center gap-2"></div>
      </div>
    </div>
  </nav>

  <main class="container page-shell py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div><h1 class="h2 mb-0">Productos</h1><p class="text-secondary mb-0">Catalogo del ecommerce</p></div>
      <a class="btn btn-outline-secondary" href="orders.html">Crear orden</a>
    </div>

    <section id="admin-product-panel" class="card shadow-sm border-0 mb-4">
      <div class="card-body">
        <h2 class="h5">Administrar producto</h2>
        <form id="product-form" class="row g-3" enctype="multipart/form-data">
          <input id="product-id" type="hidden">
          <div class="col-md-4"><label class="form-label">Nombre</label><input id="name" class="form-control" required></div>
          <div class="col-md-8"><label class="form-label">Descripcion</label><input id="description" class="form-control" required></div>
          <div class="col-md-3"><label class="form-label">Precio</label><input id="price" class="form-control" type="number" min="0.01" step="0.01" required></div>
          <div class="col-md-3"><label class="form-label">Stock</label><input id="stock" class="form-control" type="number" min="0" required></div>
          <div class="col-md-3"><label class="form-label">Status</label><select id="status" class="form-select"><option>ACTIVE</option><option>INACTIVE</option></select></div>
          <div class="col-md-3"><label class="form-label">Imagen</label><input id="image" class="form-control" type="file" accept="image/png,image/jpeg,image/webp"></div>
          <div class="col-12"><button class="btn btn-primary" type="submit">Guardar producto</button></div>
        </form>
        <p class="text-secondary small mt-3 mb-0">Al editar, si no eliges una imagen nueva, se conserva la anterior.</p>
        <div id="product-message"></div>
      </div>
    </section>

    <section class="card shadow-sm border-0 mb-4">
      <div class="card-body">
        <form id="search-form" class="row g-3 align-items-end">
          <div class="col-md-8"><label class="form-label">Buscar producto</label><input id="search" class="form-control" placeholder="laptop, mouse, teclado..."></div>
          <div class="col-md-2"><button class="btn btn-primary w-100" type="submit">Buscar</button></div>
          <div class="col-md-2"><button type="button" class="btn btn-outline-secondary w-100" onclick="loadProducts()">Ver todos</button></div>
        </form>
      </div>
    </section>

    <section id="products-list" class="row g-4"></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/product.js"></script>
</body>
</html>
