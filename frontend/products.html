<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tienda | TechnoXCXStore</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
      <div class="container-fluid page-shell">
        <a class="navbar-brand fw-bold" href="products.html">TechnoXCXStore</a
        ><button
          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div id="mainNav" class="collapse navbar-collapse">
          <div class="navbar-nav me-auto">
            <a class="nav-link active" href="products.html">Tienda</a
            ><a class="nav-link" href="orders.html">Mis compras</a>
          </div>
          <div id="session-info" class="d-flex align-items-center gap-2"></div>
        </div>
      </div>
    </nav>
    <main class="container-fluid page-shell py-4">
      <div class="row g-4">
        <section class="col-xl-8">
          <div
            class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4"
          >
            <div>
              <h1 class="h3 mb-1">Catalogo</h1>
              <p class="text-secondary mb-0">
                Productos disponibles para compra
              </p>
            </div>
            <form id="search-form" class="d-flex search-box">
              <input
                id="product-search"
                class="form-control"
                placeholder="Buscar producto"
              /><button class="btn btn-outline-primary" type="submit">
                Buscar
              </button>
            </form>
          </div>
          <div id="products-message"></div>
          <div id="product-grid" class="row g-3"></div>
        </section>
        <aside class="col-xl-4">
          <div class="cart-panel">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h2 class="h5 mb-0">Tu carrito</h2>
              <span id="cart-count" class="badge text-bg-primary">0</span>
            </div>
            <div id="cart-items"></div>
            <div class="border-top pt-3 mt-3">
              <div class="d-flex justify-content-between fw-bold fs-5">
                <span>Total</span><span id="cart-total">$0.00</span>
              </div>
              <button id="checkout-button" class="btn btn-success w-100 mt-3">
                Finalizar compra
              </button>
              <div id="cart-message"></div>
            </div>
          </div>
          <div class="card mt-4">
            <div class="card-header fw-semibold">Asistente en linea</div>
            <div class="card-body">
              <div id="chat-box" class="chat-box mb-3"></div>
              <form id="chat-form" class="input-group">
                <input
                  id="chat-input"
                  class="form-control"
                  placeholder="Pregunta por envios, pagos..."
                  required
                /><button class="btn btn-primary">Enviar</button>
              </form>
              <small id="chat-status" class="text-secondary d-block mt-2"
                >Conectando...</small
              >
            </div>
          </div>
        </aside>
      </div>
    </main>
    <div class="modal fade" id="checkout-modal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title fs-5">Confirmar compra</h2>
            <button
              class="btn-close"
              type="button"
              data-bs-dismiss="modal"
              aria-label="Cerrar"
            ></button>
          </div>
          <div class="modal-body">
            <p class="text-secondary">
              Revisa el resumen antes de confirmar tu compra.
            </p>
            <div id="checkout-summary"></div>
            <div
              class="d-flex justify-content-between border-top pt-3 mt-3 fs-5 fw-bold"
            >
              <span>Total</span>
              <span id="checkout-total">$0.00</span>
            </div>
            <div id="checkout-message"></div>
          </div>
          <div class="modal-footer">
            <button
              class="btn btn-secondary"
              type="button"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button
              id="confirm-checkout-button"
              class="btn btn-success"
              type="button"
            >
              Confirmar compra
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/product.js"></script>
    <script src="js/chat.js"></script>
  </body>
</html>
