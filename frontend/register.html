<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <h1>Registro</h1>
    <nav><a href="index.html">Inicio</a><a href="login.html">Login</a><span id="session-info"></span></nav>
  </header>
  <main>
    <section class="panel">
      <form id="register-form">
        <label>Nombre</label><input id="name" required>
        <label>Email</label><input id="email" type="email" required>
        <label>Contrasena</label><input id="password" type="password" minlength="6" required>
        <label>Rol</label><select id="role"><option>CUSTOMER</option><option>ADMIN</option></select>
        <button type="submit">Registrar</button>
      </form>
      <div id="auth-message"></div>
    </section>
  </main>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
