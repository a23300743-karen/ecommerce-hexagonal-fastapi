<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid page-shell">
      <a class="navbar-brand fw-bold" href="index.html">E-commerce Tech</a>
      <div class="d-flex gap-2"><a class="btn btn-outline-light btn-sm" href="login.html">Login</a><span id="session-info"></span></div>
    </div>
  </nav>

  <main class="container page-shell py-4">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-6">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <h1 class="h3 mb-3">Registrar usuario</h1>
            <form id="register-form">
              <div class="mb-3"><label class="form-label">Nombre</label><input id="name" class="form-control" required></div>
              <div class="mb-3"><label class="form-label">Email</label><input id="email" class="form-control" type="email" required></div>
              <div class="mb-3"><label class="form-label">Contrasena</label><input id="password" class="form-control" type="password" minlength="6" required></div>
              <div class="mb-3"><label class="form-label">Rol</label><select id="role" class="form-select"><option>CUSTOMER</option><option>ADMIN</option></select></div>
              <button class="btn btn-primary w-100" type="submit">Registrar</button>
            </form>
            <div id="auth-message"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
