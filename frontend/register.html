<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Registro | TechnoXCXStore</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="auth-page">
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-7">
          <div class="card auth-card">
            <div class="card-body p-4 p-md-5">
              <a href="login.html" class="small text-decoration-none"
                >&larr; Volver al login</a
              >
              <h1 class="h3 mt-3">Crear cuenta de cliente</h1>
              <p class="text-secondary">
                Estos datos se usaran para identificar tus compras y entregas.
              </p>
              <form id="register-form" class="row g-3">
                <div class="col-md-6">
                  <label class="form-label" for="name">Nombre completo</label
                  ><input id="name" class="form-control" required />
                </div>
                <div class="col-md-6">
                  <label class="form-label" for="email">Correo</label
                  ><input
                    id="email"
                    class="form-control"
                    type="email"
                    required
                  />
                </div>
                <div class="col-12">
                  <label class="form-label" for="address"
                    >Direccion de entrega</label
                  ><input id="address" class="form-control" required />
                </div>
                <div class="col-md-6">
                  <label class="form-label" for="phone"
                    >Telefono (opcional)</label
                  ><input
                    id="phone"
                    class="form-control"
                    inputmode="tel"
                    placeholder="10 digitos"
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label" for="password">Contrasena</label
                  ><input
                    id="password"
                    class="form-control"
                    type="password"
                    minlength="6"
                    required
                  />
                </div>
                <div class="col-12">
                  <button class="btn btn-primary" type="submit">
                    Crear cuenta
                  </button>
                </div>
              </form>
              <div id="auth-message"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
