services:
  mysql:
    image: mysql:8.0
    container_name: ecommerce_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ecommerce_root}
      MYSQL_DATABASE: ecommerce
    volumes:
      - ecommerce_mysql_data:/var/lib/mysql
      - ./ecommerce.sql:/docker-entrypoint-initdb.d/001-ecommerce.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - ecommerce_network

  app_blue:
    build:
      context: .
      dockerfile: blue/Dockerfile
    container_name: ecommerce_blue
    restart: unless-stopped
    env_file:
      - blue/release.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ecommerce_root}
      DB_NAME: ecommerce
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-blue-green-practice-secret-change-me}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ecommerce_uploads:/app/uploads
    ports:
      - "127.0.0.1:8001:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - ecommerce_network

  app_green:
    build:
      context: .
      dockerfile: green/Dockerfile
    container_name: ecommerce_green
    restart: unless-stopped
    env_file:
      - green/release.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ecommerce_root}
      DB_NAME: ecommerce
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-blue-green-practice-secret-change-me}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ecommerce_uploads:/app/uploads
    ports:
      - "127.0.0.1:8002:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - ecommerce_network

  nginx:
    image: nginx:1.27-alpine
    container_name: ecommerce_proxy
    restart: unless-stopped
    depends_on:
      app_blue:
        condition: service_healthy
      app_green:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/active-upstream.inc:/etc/nginx/active-upstream.inc:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/deployment"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce_network

networks:
  ecommerce_network:
    name: ecommerce_blue_green_network

volumes:
  ecommerce_mysql_data:
  ecommerce_uploads:
